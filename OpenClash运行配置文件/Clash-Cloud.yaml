# ====================================================================
# 配置名称：OpenClash 跨机场/区域全自动流控与延迟优化融合版
# 版本号：V0.2.2 (2026.06.30 修复版)
# 内核要求：Mihomo (Meta) Kernel 专属（内含 AND/WebRTC 等高级语法）
# 
# 核心架构逻辑：
#   1. [解耦绑定] 修正了策略组必须硬性声明 `use: [机场名]` 的内核级规范，
#                 将底层 `proxy-providers` 资源池与上层筛选组完美对接，彻底消除启动闪退。
#   2. [区域自治] “业务 → 区域故障转移 (fallback) → 区域自动/手动”三层嵌套架构。
#                 完美实现：既能享受全局/单区域内全自动最低延迟切换，又保留了各地区手动挑选的自由度。
#   3. [完美闭环] 订阅源与自动策略组全面对齐为 lazy: true（懒加载），
#                 保持“按需唤醒”状态。未命中对应规则时绝不发起后台连接，暴降路由器 CPU 开销。
#   4. [极致体验] 保留 30ms 灵敏切换容差（tolerance: 30），流量唤醒时，秒切到当前延迟最低的优质节点。
#   5. [隐私防漏] 保持物理拦截 UDP 3478 端口与 STUN 域名，从底层阻断 WebRTC 泄露国内真实 IP。
#   6. [风控闭环] 维持金融、支付、政务类域名的 Fake-IP 过滤与强制直连规则，完美解决银行风控与 App 报错。
#   7. [精细排除] 修复并强化 `exclude-filter` 正则，自动剔除流量、过期、官网等无效干扰节点。
# ====================================================================

# ------------------------
# 基础端口/全局配置
# ------------------------
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: "123456"
ipv6: true
unified-delay: true
tcp-concurrent: true

# ================================================================
#                  🌟【使用者核心配置区域】🌟
#       使用者拿到配置文件后，只需要修改下面这个框内的内容即可
# ================================================================

# 1. 机场订阅配置
proxy-providers:

  主力机场:   #此处名称不能修改；非要修改要同步修改【核心策略组逻辑】下面“use：”的名称
    url: "https://sub.yourprovider.com/link/abcdefg123456" # 填入你的真实订阅链接
    type: http
    interval: 86400
    exclude-filter: 流量|账号|剩余|到期|过期|测试|试用|TG|群|官网|Expire|APP|官方|异常|邮箱|防|卸载|@|距离     
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 3000
      expected-status: 204
      lazy: false
      
# 使用ClashMI请删除下面备用机场整段代码↓↓↓
# 使用单个机场订阅可以删除以下代码； 
  备用机场:  #此处名称不能修改；非要修改要同步修改【核心策略组逻辑】下面“use：”的名称 
    url: "https://sub.yourprovider.com/link/abcdefg123456" # 填入你的真实订阅链接
    type: http
    interval: 86400
    exclude-filter: 流量|账号|剩余|到期|过期|测试|试用|TG|群|官网|Expire|APP|官方|异常|邮箱|防|卸载|@|距离     
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 3000
      expected-status: 204
      lazy: false  
# 使用ClashMI请删除下面备用机场整段代码↑↑↑
      
# 2. 静态基础节点
proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ================================================================
#                  🔒【系统核心逻辑区域】🔒
# ================================================================
# ------------------------
# DNS配置
# ------------------------
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - localhost
    - geosite:cn
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.gov.cn
    - +.12306.cn
    - +.chsi.com.cn
    - +.apple.com
    - +.icloud.com
    - +.baidu.com
    - +.amap.com
    - +.alipay.com
    - +.alipayobjects.com
    - +.wechat.com
    - +.wechatpay.cn
    - +.unionpay.com
    - +.95516.com
    - +.tenpay.com
    - +.95559.com.cn
    - +.95599.cn
    - +.abchina.com
    - +.icbc.com.cn
    - +.ccb.com
    - +.boc.cn
    - +.cmbchina.com

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    
  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - "https://8.8.8.8/dns-query#所有-自动"
      - "https://1.1.1.1/dns-query#所有-自动"
      - "https://dns.google/dns-query"

  nameserver:
    - 223.5.5.5
    - "https://8.8.8.8/dns-query#所有-自动"
    - "https://1.1.1.1/dns-query#所有-自动"

# ------------------------
# TUN模块
# ------------------------
tun:
  enable: true
  stack: gvisor
  device: utun
  auto-route: true
  auto-detect-interface: true
  auto-redirect: true
  strict-route: true

# ------------------------
# 节点状态保存
# ------------------------
profile:
  store-selected: true
  store-fake-ip: true

# ------------------------
# 策略组锚点
# ------------------------
default: &default
  type: select
  proxies:
    - 直连
    - 所有-自动          
    - 所有-手动
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 新加坡-故转
    - 韩国-故转
    - 美国-故转
    - 英国-故转
    - 其他-故转
    - 拒绝

# ------------------------
# 核心策略组逻辑
# ------------------------
