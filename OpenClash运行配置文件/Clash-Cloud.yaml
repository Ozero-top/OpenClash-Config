  - {name: 其他, <<: *default}
  
  # 2. 全局节点组
  - name: 所有-手动
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"

  - name: 所有-自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 3000          
    clear-override: true
    use:
      - 主力机场
      - 备用机场
    include-all: true
    tolerance: 30
    lazy: true                # 策略组保持懒加载，无流量不干活
    exclude-filter: "直连|拒绝" 
    use-provider-health: true # 强行白嫖机场订阅提供的全局定时测速缓存
    
  # 香港组
